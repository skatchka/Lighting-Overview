\",\"version\":1}}","promptText":"Lighting Control Guidelines\n\nOccupancy Sensors\n\nStrategic placement of occupancy sensors optimizes energy efficiency while ensuring safety. They are generally installed at switches for cost-effectiveness but avoided in sensitive areas such as daycare restrooms or convalescent homes.\n\nHazard Avoidance\n\nCertain rooms, like mechanical spaces, should exclude sensors to prevent accidents. Privacy concerns in spaces such as schools and surveillance-sensitive zones guide sensor installation choices.\n\nFan Light Combination\n\nFor fan/light combinations, the bulb in the light should be replaced, we do not replace restroom fans as part of our program\n\nFor the occupancy sensor to function with a fan/light combination, a neutral conductor must be present at the switch.\n\nIf the current light switch controls both fans and lighting and does not have a neutral, abort the occupancy sensor installation","jobId":"2WvgtGbfFMomtTRw9","featureAdoption":{"isAddingPauses":true,"isUsingMultipleVoices":false,"isAdjustingSpeed":false},"voiceCodeUsed":"en-GB-AbbiNeural"}},"icDgkZMMADCKB7hps":{"_id":"icDgkZMMADCKB7hps","data":{"attributes":{"displayOrder":1,"template":"resourceSlide","locale":"en","title":"Lighting Retrofit Standards","upload":"6p9uFRbTMuNR8ykeX"},"assessment":{"graded":false,"showFeedback":true},"video":{"autoPlay":true,"overlays":[{"identifier":"ScmW6vMit84QkG7Gg","type":"rectangle","width":640.0000000000001,"height":720,"entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"customStyle":{"verticalAlignment":"middle","type":"rectangle","lineHeight":1.2,"textAlignment":"center","border":{"color":"koantic(accent1, 5, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fill":{"type":"color","color":"koantic(accent1, 0, 1)"},"fontColor":"koantic(light1, 0, 1)","padding":{"left":0,"top":0,"bottom":0
